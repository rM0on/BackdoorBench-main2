attack: issba
attack_label_trans: all2one
attack_target: 0
pratio: 0.1
img_size: [32, 32, 3]

# ISSBA/StegaStamp 参数
secret_len: 20
enc_height: 32
enc_width: 32
hidden_size: 32

# Stage 1: Encoder Training
enc_lr: 0.001
enc_epochs: 20
lmbda_image: 1.0
lmbda_secret: 10.0
lmbda_gan: 0.01

# Stage 2: Classifier Training
epochs: 100
batch_size: 128
lr: 0.01
lr_scheduler: MultiStepLR
model: preactresnet18
client_optimizer: sgd
sgd_momentum: 0.9
wd: 0.0005
frequency_save: 0
device: cuda:0

# >>> 关键新增参数 <<<
steplr_milestones: [50, 75]
steplr_gamma: 0.1