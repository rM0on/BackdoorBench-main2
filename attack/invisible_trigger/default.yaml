attack: invisible_trigger

attack_label_trans: all2one
attack_target: 7
pratio: 0.1

# paper-aligned generator design
content_layer: conv2_2
trigger_layers: [conv1_1, conv2_1, conv3_1, conv4_1, conv5_1]
trigger_layer_weights: [1.0, 0.8, 0.5, 0.3, 0.1]

# generator optimization
alpha: 1.0e-6
beta: 1.0
max_iter: 100
gen_lr: 0.05
gen_momentum: 0.9
ssim_threshold: 0.995

# trigger image source pool:
# target = only choose trigger image from target class
# any    = choose trigger image from all classes
trigger_img_from: target

# key change:
# fixed  = one fixed trigger image for the whole experiment
# random = sample one trigger image for each sample
trigger_selection_mode: fixed

# save a few content/trigger/poisoned examples for checking
save_debug_examples: 10

# optional local VGG19 weight path
vgg_weights_path: null