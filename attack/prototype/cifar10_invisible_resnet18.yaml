device: cuda:0
pin_memory: True
non_blocking: True
prefetch: False
amp: False

checkpoint_save: null
dataset_path: ./data/cifar10
dataset: cifar10
num_classes: 10
input_height: 32
input_width: 32
input_channel: 3
img_size: [32, 32, 3]

epochs: 100
batch_size: 128
num_workers: 4
lr: 0.01
lr_scheduler: CosineAnnealingLR
steplr_stepsize: 20
steplr_gamma: 0.1
steplr_milestones: [50, 75]
model: resnet18
client_optimizer: sgd
sgd_momentum: 0.9
wd: 0.0005
frequency_save: 0
random_seed: 0